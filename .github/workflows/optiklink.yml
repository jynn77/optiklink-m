name: OptikLink 每日自动登录+服务器保活

on:
  schedule:
    # 使用 cron 表达式，但实际运行时间会随机偏移
    # 基础时间：每天 UTC 00:00（北京时间 08:00）
    - cron: '0 1 */3 * *'
  workflow_dispatch:
    

permissions:
  contents: write

jobs:
 
  auto-login:
    runs-on: ubuntu-latest
    timeout-minutes: 20        # 增加到20分钟，适应重试逻辑

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install requests cloudscraper "requests[socks]"

      # ----- Xray 代理（精简输出版）-----
      - name: 下载并启动 Xray 代理（精简版）
        env:
          V2RAY_CONFIG: ${{ secrets.V2RAY_CONFIG }}
        run: |
          set -euo pipefail
          trap 'rm -f xray.zip xray config.json xray.log' EXIT

          # 安装工具（完全静默）
          sudo apt-get update -qq >/dev/null 2>&1 && sudo apt-get install -y -qq jq netcat-openbsd >/dev/null 2>&1

          # 下载 Xray
          curl -sL --fail -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip xray && chmod +x xray

          # 写入配置并校验
          echo "$V2RAY_CONFIG" | jq . > config.json 2>/dev/null || { echo "❌ 配置无效"; exit 1; }
          echo "✅ 配置有效"

          # 启动 Xray
          ./xray run -c config.json > xray.log 2>&1 &
          XRAY_PID=$!
          echo "XRAY_PID=$XRAY_PID" >> $GITHUB_ENV

          # 等待端口就绪（静默，仅最终输出）
          for i in {1..30}; do
            nc -z 127.0.0.1 10808 2>/dev/null && break
            sleep 1
          done
          if ! nc -z 127.0.0.1 10808 2>/dev/null; then
            echo "❌ 端口未就绪，Xray 日志："
            tail -20 xray.log
            exit 1
          fi
          echo "✅ 代理端口已就绪"

          # 测试代理出口 IP
          PROXY_IP=$(curl -s --max-time 10 --socks5 127.0.0.1:10808 ifconfig.me 2>/dev/null || echo "")
          if [ -n "$PROXY_IP" ]; then
            echo "代理 IP: $PROXY_IP"
          else
            echo "❌ 代理测试失败"
            exit 1
          fi

      # ----- 执行登录和保活脚本 -----
      - name: 执行自动登录+服务器保活脚本
        id: login
        env:
          DISCORD_TOKEN:        ${{ secrets.DISCORD_TOKEN }}
          BOT_TOKEN:            ${{ secrets.BOT_TOKEN }}
          CHAT_ID:              ${{ secrets.CHAT_ID }}
          DISCORD_CLIENT_ID:    ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_REDIRECT_URI: ${{ secrets.DISCORD_REDIRECT_URI }}
          EXPIRE_DATE:          ${{ secrets.EXPIRE_DATE }}
          PROXY_URL:            'socks5://127.0.0.1:10808'
          PANEL_API_KEY:        ${{ secrets.PANEL_API_KEY }}
          PANEL_SERVER_ID:      ${{ secrets.PANEL_SERVER_ID }}
          PANEL_URL:            "https://control.optiklink.net"
          SERVER_START_WAIT:    "60"
        run: |
       
          python optiklink_login.py

      # ----- 自动更新 DISCORD_CLIENT_ID -----
      - name: 自动更新 DISCORD_CLIENT_ID Secret
        if: steps.login.outputs.new_client_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_CID:  ${{ steps.login.outputs.new_client_id }}
        run: |
          echo "检测到新 client_id，正在自动更新 Secret..."
          gh secret set DISCORD_CLIENT_ID --body "$NEW_CID" --repo "$GITHUB_REPOSITORY"
          echo "✅ Secret DISCORD_CLIENT_ID 已自动更新"

      # ----- 提交 time.txt 保持仓库活跃 -----
      - name: 提交 time.txt 保持仓库活跃
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi

  # ----- 清理旧的 workflow runs -----
  cleanup-old-runs:
    runs-on: ubuntu-latest
    needs: auto-login
    if: always()
    permissions:
      actions: write
    steps:
      - name: 删除多余的 workflow run（保留最新 2 条）
        uses: actions/github-script@v7
        with:
          script: |
            const KEEP = 2;
            const workflowName = "OptikLink 每日自动登录+服务器保活";
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            const wf = workflows.data.workflows.find(w => w.name === workflowName);
            if (!wf) {
              console.log("未找到 workflow，跳过清理");
              return;
            }
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                workflow_id: wf.id,
                per_page:    100,
              }
            );
            const toDelete = runs.slice(KEEP);
            console.log(`共 ${runs.length} 条 run，保留 ${KEEP} 条，删除 ${toDelete.length} 条`);
            for (const run of toDelete) {
              await github.rest.actions.deleteWorkflowRun({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                run_id: run.id,
              });
              console.log(`已删除 run #${run.run_number} (id=${run.id})`);
            }
